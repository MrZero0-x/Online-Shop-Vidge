<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vedgi - Сообщения</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Стили для сообщений */
        .messages-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        
        .messages-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        
        .messages-header h1 {
            font-family: 'Cinzel', serif;
            color: var(--accent-color);
        }
        
        .messages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .message-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .message-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            border-color: var(--accent-color);
        }
        
        .message-card.new {
            border-left: 5px solid #ffc107;
        }
        
        .message-card.answered {
            border-left: 5px solid #28a745;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }
        
        .message-status {
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-new {
            background: #ffc107;
            color: #000;
        }
        
        .status-answered {
            background: #28a745;
            color: white;
        }
        
        .message-date {
            font-size: 12px;
            opacity: 0.7;
        }
        
        .message-sender {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .message-subject {
            color: var(--accent-color);
            margin-bottom: 10px;
        }
        
        .message-preview {
            font-size: 14px;
            opacity: 0.8;
            margin-bottom: 10px;
            max-height: 60px;
            overflow: hidden;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent-color);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            max-width: 600px;
            width: 90%;
            background: var(--card-bg);
            border-radius: 10px;
            padding: 30px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .modal-header h2 {
            color: var(--accent-color);
        }
        
        .close-modal {
            font-size: 30px;
            cursor: pointer;
        }
        
        .message-detail {
            margin-bottom: 20px;
        }
        
        .message-detail p {
            margin: 10px 0;
        }
        
        .message-detail .message-text {
            background: var(--header-bg);
            padding: 15px;
            border-radius: 5px;
            margin: 10px 0;
        }
        
        .answer-textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid var(--border-color);
            border-radius: 5px;
            margin: 10px 0;
            min-height: 100px;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .btn-success {
            background: #28a745;
            color: white;
        }
        
        .btn-danger {
            background: #dc3545;
            color: white;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="container header-container">
            <div class="logo">
                <a href="index.html">Vedgi</a>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="index.html">Главная</a></li>
                    <li><a href="catalog.html">Каталог</a></li>
                    <li><a href="cart.html">Корзина</a></li>
                    <li><a href="profile.html">Профиль</a></li>
                    <li><a href="about.html">О бренде</a></li>
                    <li><a href="contacts.html">Контакты</a></li>
                </ul>
            </nav>
            <div class="auth-buttons" id="authButtons"></div>
            <button id="themeToggle" class="theme-toggle">🌙</button>
        </div>
    </header>

    <main class="messages-container">
        <div class="messages-header">
            <h1>📬 Сообщения от пользователей</h1>
            <button class="btn btn-success" onclick="loadMessages()">Обновить</button>
        </div>

        <div class="stats-grid" id="statsContainer"></div>

        <div id="messagesGrid" class="messages-grid"></div>
    </main>

    <!-- Модальное окно для ответа -->
    <div id="messageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Ответ на сообщение</h2>
                <span class="close-modal" onclick="closeModal()">&times;</span>
            </div>
            <div id="messageDetail" class="message-detail"></div>
            <textarea id="answerText" class="answer-textarea" placeholder="Введите ваш ответ..."></textarea>
            <div style="display: flex; gap: 10px;">
                <button class="btn btn-success" onclick="sendAnswer()">Отправить ответ</button>
                <button class="btn btn-danger" onclick="deleteMessage()">Удалить</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Vedgi. Все права защищены Traider INC Corporation.</p>
    </footer>

    <script>
        let currentMessageId = null;

        function updateHeader() {
            const authButtons = document.getElementById('authButtons');
            const currentUser = localStorage.getItem('current_user');
            
            if (currentUser) {
                const user = JSON.parse(currentUser);
                authButtons.innerHTML = `
                    <div class="user-menu">
                        <span class="user-name" onclick="toggleMenu(event)">${user.name} ▼</span>
                        <div class="user-dropdown" id="userDropdown">
                            <a href="profile.html">👤 Личный кабинет</a>
                            ${user.role === 'admin' ? '<a href="admin.html">⚙️ Админ-панель</a>' : ''}
                            <a href="#" onclick="logout(); return false;">🚪 Выйти</a>
                        </div>
                    </div>
                `;
            } else {
                window.location.href = 'login.html';
            }
        }

        function toggleMenu(event) {
            event.stopPropagation();
            const dropdown = document.getElementById('userDropdown');
            dropdown.classList.toggle('show');
        }

        document.addEventListener('click', () => {
            const dropdown = document.getElementById('userDropdown');
            if (dropdown) dropdown.classList.remove('show');
        });

        function logout() {
            localStorage.removeItem('current_user');
            window.location.href = 'index.html';
        }

        function loadMessages() {
            // Получаем сообщения
            const messages = JSON.parse(localStorage.getItem('vedgi_messages')) || [];
            
            // Статистика
            const stats = {
                total: messages.length,
                new: messages.filter(m => m.status === 'new').length,
                answered: messages.filter(m => m.status === 'answered').length
            };
            
            document.getElementById('statsContainer').innerHTML = `
                <div class="stat-card">
                    <div class="stat-value">${stats.total}</div>
                    <div class="stat-label">Всего</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.new}</div>
                    <div class="stat-label">Новых</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${stats.answered}</div>
                    <div class="stat-label">Отвеченных</div>
                </div>
            `;

            const grid = document.getElementById('messagesGrid');
            
            if (messages.length === 0) {
                grid.innerHTML = '<p style="text-align: center; padding: 50px;">Нет сообщений</p>';
                return;
            }

            // Сортируем: сначала новые
            messages.sort((a, b) => {
                if (a.status === 'new' && b.status !== 'new') return -1;
                if (a.status !== 'new' && b.status === 'new') return 1;
                return new Date(b.date) - new Date(a.date);
            });

            grid.innerHTML = messages.map(msg => `
                <div class="message-card ${msg.status}" onclick="openMessage('${msg.id}')">
                    <div class="message-header">
                        <span class="message-status ${msg.status === 'new' ? 'status-new' : 'status-answered'}">
                            ${msg.status === 'new' ? '🆕 Новое' : '✅ Отвечено'}
                        </span>
                        <span class="message-date">${msg.date}</span>
                    </div>
                    <div class="message-sender">${msg.name} (${msg.email})</div>
                    <div class="message-subject">${msg.subject}</div>
                    <div class="message-preview">${msg.message.substring(0, 100)}${msg.message.length > 100 ? '...' : ''}</div>
                    ${msg.answer ? '<div style="color: #28a745; font-size: 12px;">✓ Есть ответ</div>' : ''}
                </div>
            `).join('');
        }

        function openMessage(id) {
            const messages = JSON.parse(localStorage.getItem('vedgi_messages')) || [];
            const message = messages.find(m => m.id === id);
            currentMessageId = id;

            document.getElementById('messageDetail').innerHTML = `
                <p><strong>От:</strong> ${message.name}</p>
                <p><strong>Email:</strong> ${message.email}</p>
                <p><strong>Телефон:</strong> ${message.phone || 'Не указан'}</p>
                <p><strong>Тема:</strong> ${message.subject}</p>
                <p><strong>Дата:</strong> ${message.date}</p>
                <p><strong>Сообщение:</strong></p>
                <div class="message-text">${message.message.replace(/\n/g, '<br>')}</div>
                ${message.answer ? `
                    <p><strong>Ваш ответ:</strong></p>
                    <div class="message-text" style="border-left: 3px solid #28a745;">${message.answer.replace(/\n/g, '<br>')}</div>
                ` : ''}
            `;

            document.getElementById('answerText').value = message.answer || '';
            document.getElementById('messageModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('messageModal').classList.remove('active');
            currentMessageId = null;
        }

        function sendAnswer() {
            const answer = document.getElementById('answerText').value.trim();
            if (!answer) {
                alert('Введите ответ');
                return;
            }

            const messages = JSON.parse(localStorage.getItem('vedgi_messages')) || [];
            const index = messages.findIndex(m => m.id === currentMessageId);

            if (index !== -1) {
                messages[index].status = 'answered';
                messages[index].answer = answer;
                messages[index].answeredBy = 'Администратор';
                messages[index].answeredDate = new Date().toLocaleString();

                localStorage.setItem('vedgi_messages', JSON.stringify(messages));
                alert('✅ Ответ отправлен!');
                closeModal();
                loadMessages();
            }
        }

        function deleteMessage() {
            if (!confirm('Удалить сообщение?')) return;

            const messages = JSON.parse(localStorage.getItem('vedgi_messages')) || [];
            const filtered = messages.filter(m => m.id !== currentMessageId);
            localStorage.setItem('vedgi_messages', JSON.stringify(filtered));
            
            alert('🗑️ Сообщение удалено');
            closeModal();
            loadMessages();
        }

        const themeToggle = document.getElementById('themeToggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-theme');
            themeToggle.textContent = document.body.classList.contains('dark-theme') ? '☀️' : '🌙';
        });

        const savedTheme = localStorage.getItem('vedgi_theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark-theme');
            themeToggle.textContent = '☀️';
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateHeader();
            loadMessages();
        });
    </script>
</body>
</html>
